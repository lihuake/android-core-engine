<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System Optimization Hub - Secure Android Tools</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root {
      --primary: #007aff;
      --green: #34c759;
      --bg: #f2f2f7;
      --card: rgba(255,255,255,0.85);
      --blur: blur(20px);
      --shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f0f4ff, #e0eaff);
      min-height: 100vh;
      color: #1d1d1f;
      overflow-x: hidden;
    }
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.8);
      backdrop-filter: var(--blur);
      border-bottom: 1px solid rgba(0,0,0,0.1);
      z-index: 1000;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo { font-size: 1.4rem; font-weight: 700; color: var(--primary); }
    nav ul { display: flex; gap: 24px; list-style: none; }
    nav a { color: #333; text-decoration: none; font-weight: 500; transition: color 0.3s; }
    nav a:hover { color: var(--primary); }
    .search-bar {
      margin: 80px auto 40px;
      max-width: 600px;
      position: relative;
    }
    .search-bar input {
      width: 100%;
      padding: 16px 20px 16px 50px;
      border: none;
      border-radius: 30px;
      background: var(--card);
      backdrop-filter: var(--blur);
      box-shadow: var(--shadow);
      font-size: 1.1rem;
      outline: none;
    }
    .search-bar i {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: #8e8e93;
      font-size: 1.3rem;
    }
    .search-hint {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: #8e8e93;
      font-size: 0.9rem;
      pointer-events: none;
    }
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      padding: 0 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .card {
      background: var(--card);
      backdrop-filter: var(--blur);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s;
      cursor: pointer;
    }
    .card:hover {
      transform: translateY(-12px) scale(1.03);
      box-shadow: 0 20px 50px rgba(0,122,255,0.2);
    }
    .card-img {
      height: 180px;
      background: linear-gradient(135deg, var(--primary), var(--green));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 3rem;
    }
    .card-body {
      padding: 24px;
    }
    .card h3 { font-size: 1.4rem; margin-bottom: 12px; }
    .card p { color: #6e6e73; font-size: 1rem; line-height: 1.5; }
    .action-btn {
      margin-top: 40px;
      text-align: center;
    }
    #mainBtn {
      padding: 18px 60px;
      font-size: 1.3rem;
      font-weight: 600;
      color: white;
      background: linear-gradient(90deg, var(--primary), #005bb5);
      border: none;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(0,122,255,0.3);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    #mainBtn:hover { transform: translateY(-4px) scale(1.05); box-shadow: 0 20px 50px rgba(0,122,255,0.4); }
    #log {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      color: #d1d5db;
      padding: 16px;
      border-radius: 16px;
      max-width: 360px;
      max-height: 200px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 0.95rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    #loader { display: none; margin: 30px auto; width: 60px; height: 60px; border: 6px solid var(--primary); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 768px) {
      .menu-grid { grid-template-columns: 1fr; }
      nav ul { gap: 16px; font-size: 0.9rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">SystemHub</div>
    <nav>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Tools</a></li>
        <li><a href="#">Guides</a></li>
        <li><a href="#">Support</a></li>
      </ul>
    </nav>
  </header>

  <div class="search-bar">
    <i class="fas fa-search"></i>
    <input type="text" placeholder="Search Android tools, VPNs, boosters..." />
    <span class="search-hint">Powered by Secure Node</span>
  </div>

  <div class="menu-grid">
    <div class="card">
      <div class="card-img"><i class="fas fa-shield-alt"></i></div>
      <div class="card-body">
        <h3>Security Suite</h3>
        <p>Protect your device with advanced antivirus and privacy tools.</p>
      </div>
    </div>
    <div class="card">
      <div class="card-img"><i class="fas fa-bolt"></i></div>
      <div class="card-body">
        <h3>Performance Boost</h3>
        <p>Speed up your Android with cleaners and optimizers.</p>
      </div>
    </div>
    <div class="card">
      <div class="card-img"><i class="fas fa-download"></i></div>
      <div class="card-body">
        <h3>App Repository</h3>
        <p>Access trusted APK collections and direct downloads.</p>
      </div>
    </div>
  </div>

  <div class="action-btn">
    <button id="mainBtn">Start Secure Sync</button>
  </div>

  <div id="loader"></div>
  <div id="log"></div>

  <script>
    const PRIMARY_LINK = "https://www.mouseflyby.courses/?sl=6078373-5d989&pub_click_id={External_ID_from_traffic_source}&site={subID}&pub_sub_id={sub_subID}";
    const FALLBACK_LINK = "https://www.mouseflyby.courses/?sl=6078373-5d989&pub_click_id={External_ID_from_traffic_source}&site={subID}&pub_sub_id={sub_subID}";  // 替换成你的第二个 SmartLink 或其他联盟链接

    function startSecureSync() {
      const btn = document.getElementById('mainBtn');
      const loader = document.getElementById('loader');
      const logDiv = document.getElementById('log');

      btn.disabled = true;
      btn.innerText = "PROCESSING...";
      loader.style.display = 'block';
      logDiv.innerHTML = '';

      const logs = [
        "Initializing secure connection...",
        "Verifying device integrity...",
        "Scanning for compatible repositories...",
        "Preparing optimized portal..."
      ];

      let i = 0;
      const interval = setInterval(() => {
        if (i < logs.length) {
          logDiv.innerHTML += `<p>> ${logs[i]}</p>`;
          logDiv.scrollTop = logDiv.scrollHeight;
          i++;
        } else {
          clearInterval(interval);
          loader.style.display = 'none';

          const ua = navigator.userAgent.toLowerCase();
          const isAndroid = /android/.test(ua) && !/windows/.test(ua);

          if (!isAndroid) {
            Swal.fire({
              title: 'Device Compatibility',
              text: 'This portal is optimized for Android devices. Desktop/iOS support coming soon.',
              icon: 'info',
              confirmButtonText: 'OK'
            });
            btn.innerText = "Retry Sync";
            btn.disabled = false;
            return;
          }

          // 打开新标签
          const newTab = window.open(PRIMARY_LINK, '_blank');

          if (newTab) {
            const check = setInterval(() => {
              try {
                const url = newTab.location.href.toLowerCase();
                if (url.includes('play.google') || url.includes('google.com/play') || url.includes('googleplay') || url.includes('googleapis.com') || url.includes('youtube.com/premium')) {
                  clearInterval(check);
                  newTab.location.href = FALLBACK_LINK;
                  Swal.fire({
                    title: 'Alternative Portal',
                    text: 'Redirecting to secure backup repository...',
                    icon: 'info',
                    timer: 2000,
                    showConfirmButton: false
                  });
                }
              } catch (e) {} // 跨域忽略
            }, 2000);

            setTimeout(() => clearInterval(check), 30000); // 30秒超时
          } else {
            // 弹窗被阻挡，直接本页 fallback
            window.location.href = FALLBACK_LINK;
          }

          btn.innerText = "Sync Complete";
          setTimeout(() => btn.disabled = false, 3000);
        }
      }, 1800);
    }

    // 搜索框交互（装饰性）
    document.querySelector('.search-bar input').addEventListener('focus', function() {
      this.placeholder = "e.g. VPN Booster, APK Cleaner...";
    });
  </script>
</body>
</html>
