<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>Market Hub - Secure Android Distribution</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --ios-blue: #007aff; --ios-bg: #f5f5f7; --ios-text: #1d1d1f; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; background: var(--ios-bg); color: var(--ios-text); text-align: center; padding: 60px 25px; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .icon-box { background: #fff; width: 80px; height: 80px; border-radius: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .icon-box i { font-size: 40px; color: var(--ios-blue); }
        h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 12px; }
        p { color: #8e8e93; font-size: 15px; line-height: 1.6; max-width: 300px; }
        
        .status-container { margin-top: 40px; width: 100%; max-width: 320px; background: rgba(255,255,255,0.6); border-radius: 15px; padding: 20px; border: 0.5px solid rgba(0,0,0,0.05); text-align: left; }
        .status-item { font-family: "SF Mono", monospace; font-size: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .dot { height: 8px; width: 8px; background-color: #34c759; border-radius: 50%; display: inline-block; margin-right: 5px; animation: blink 1s infinite; }
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        .progress-bar { width: 100%; height: 4px; background: #e3e3e8; border-radius: 2px; margin-top: 15px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: var(--ios-blue); transition: width 0.5s ease; }
        
        .footer { margin-top: auto; padding: 30px 0; font-size: 11px; color: #c1c1c6; letter-spacing: 0.3px; }
    </style>
</head>
<body>

    <div class="icon-box">
        <i class="fas fa-shield-halved"></i>
    </div>
    
    <h1>Node Security Audit</h1>
    <p>We are currently verifying our global distribution mirrors to ensure secure package delivery.</p>

    <div class="status-container">
        <div class="status-item">
            <span><span class="dot"></span> SSL Encryption</span>
            <span style="color:#34c759">VERIFIED</span>
        </div>
        <div class="status-item">
            <span><span class="dot" style="background:#ff9500"></span> Mirror Sync</span>
            <span id="sync-val">82%</span>
        </div>
        <div class="status-item" style="color:#8e8e93">
            <span><i class="fas fa-location-dot"></i> Region: US/UK Nodes</span>
            <span>ACTIVE</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="p-fill"></div>
        </div>
    </div>

    <div class="footer">
        SECURITY PROTOCOL v4.2.1 • KAPTH SECURE NODE<br>
        © 2026 Distribution Services. All rights reserved.
    </div>

    <script>
        // 动态进度效果，增强真实感
        let progress = 82;
        const fill = document.getElementById('p-fill');
        const val = document.getElementById('sync-val');
        
        const update = () => {
            if (progress < 99) {
                progress += Math.random() * 2;
                if (progress > 99) progress = 99.4;
                fill.style.width = progress + "%";
                val.innerText = Math.floor(progress) + "%";
            }
        };
        setInterval(update, 3000);
        fill.style.width = "82%";

        // 预留：当你在 Adsterra 准备好 app.kapth.com 的新链接后
        // 可以在这里加入自动跳转逻辑，但建议先保持现状 24 小时以恢复域名信誉
    </script>
</body>
</html>
