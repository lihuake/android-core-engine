<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>App Store - Secure Android Discovery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        :root {
            --ios-blue: #007aff;
            --ios-bg: #ffffff;
            --ios-secondary-bg: #f2f2f7;
            --ios-text: #000000;
            --ios-gray: #8e8e93;
            --glass: rgba(255, 255, 255, 0.7);
            --blur: blur(30px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif; background-color: var(--ios-bg); color: var(--ios-text); line-height: 1.2; }

        /* 顶部导航 - Apple 风格 */
        header {
            position: sticky; top: 0; z-index: 1000;
            background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            padding: 15px 20px; border-bottom: 0.5px solid rgba(0,0,0,0.1);
        }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .nav-top h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
        .user-icon { width: 32px; height: 32px; background: var(--ios-blue); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 14px; }

        /* 五级菜单导航 */
        .tab-menu { display: flex; justify-content: space-between; list-style: none; padding: 5px 0; border-top: 0.5px solid rgba(0,0,0,0.05); }
        .tab-menu li { text-align: center; flex: 1; }
        .tab-menu a { text-decoration: none; color: var(--ios-gray); font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tab-menu a.active { color: var(--ios-blue); }
        .tab-menu i { font-size: 20px; }

        /* 搜索框 - 重点优化 */
        .search-container { padding: 15px 20px; background: var(--ios-bg); }
        .search-box {
            position: relative; background: var(--ios-secondary-bg);
            border-radius: 10px; display: flex; align-items: center; padding: 8px 12px;
        }
        .search-box i { color: var(--ios-gray); font-size: 16px; margin-right: 8px; }
        .search-box input {
            border: none; background: transparent; width: 100%; font-size: 17px;
            outline: none; color: var(--ios-text);
        }

        /* 推荐内容卡片 */
        .section-title { padding: 20px 20px 10px; font-size: 22px; font-weight: 700; }
        .app-list { padding: 0 20px; }
        .app-item {
            display: flex; align-items: center; padding: 12px 0;
            border-bottom: 0.5px solid rgba(0,0,0,0.05); cursor: pointer;
        }
        .app-icon { width: 60px; height: 60px; border-radius: 12px; margin-right: 15px; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; }
        .app-info { flex: 1; }
        .app-info h3 { font-size: 17px; font-weight: 600; margin-bottom: 2px; }
        .app-info p { font-size: 13px; color: var(--ios-gray); }
        .get-btn {
            background: var(--ios-secondary-bg); color: var(--ios-blue);
            padding: 6px 20px; border-radius: 20px; font-weight: 700; font-size: 14px; border: none;
        }

        /* 终端仿真 Log */
        #log-overlay {
            position: fixed; bottom: 80px; left: 20px; right: 20px;
            background: rgba(0,0,0,0.8); color: #00ff00; padding: 15px;
            border-radius: 12px; font-family: monospace; font-size: 12px;
            display: none; z-index: 2000; pointer-events: none;
        }

        /* 底部加载指示器 */
        #spinner { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 3000; }
        .dot-loader { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--ios-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <div class="nav-top">
        <h1>Search</h1>
        <div class="user-icon"><i class="fas fa-user"></i></div>
    </div>
    <ul class="tab-menu">
        <li><a href="#" class="active"><i class="fas fa-rocket"></i><span>Today</span></a></li>
        <li><a href="#"><i class="fas fa-gamepad"></i><span>Games</span></a></li>
        <li><a href="#"><i class="fas fa-th-large"></i><span>Apps</span></a></li>
        <li><a href="#"><i class="fas fa-star"></i><span>Arcade</span></a></li>
        <li><a href="#" onclick="triggerRedirect()"><i class="fas fa-search"></i><span>Search</span></a></li>
    </ul>
</header>

<div class="search-container">
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search for Android tools..." onkeypress="handleSearch(event)">
    </div>
</div>

<div class="section-title">Suggested for You</div>

<div class="app-list">
    <div class="app-item" onclick="triggerRedirect()">
        <div class="app-icon" style="background: linear-gradient(135deg, #FF9500, #FFCC00);"><i class="fas fa-bolt"></i></div>
        <div class="app-info">
            <h3>System Booster Pro</h3>
            <p>Optimize kernel & CPU performance</p>
        </div>
        <button class="get-btn">GET</button>
    </div>

    <div class="app-item" onclick="triggerRedirect()">
        <div class="app-icon" style="background: linear-gradient(135deg, #34C759, #248A3D);"><i class="fas fa-shield-halved"></i></div>
        <div class="app-info">
            <h3>Secure Tunnel VPN</h3>
            <p>Privacy-first encrypted gateway</p>
        </div>
        <button class="get-btn">GET</button>
    </div>

    <div class="app-item" onclick="triggerRedirect()">
        <div class="app-icon" style="background: linear-gradient(135deg, #007AFF, #0051A8);"><i class="fas fa-broom"></i></div>
        <div class="app-info">
            <h3>Clean Master AI</h3>
            <p>Deep scan and file management</p>
        </div>
        <button class="get-btn">GET</button>
    </div>
</div>

<div id="log-overlay"></div>
<div id="spinner"><div class="dot-loader"></div></div>

<script>
    // 你的核心盈利链接
    const SMART_LINK = "https://www.mouseflyby.courses/?sl=6078373-5d989&pub_click_id={External_ID_from_traffic_source}&site={subID}&pub_sub_id={sub_subID}";

    // 搜索直达逻辑：输入文字按回车直接重定向
    function handleSearch(event) {
        if (event.key === "Enter") {
            triggerRedirect();
        }
    }

    function triggerRedirect() {
        const log = document.getElementById('log-overlay');
        const spinner = document.getElementById('spinner');
        
        log.style.display = 'block';
        spinner.style.display = 'block';
        
        const messages = [
            "> Initializing Secure Engine...",
            "> Authenticating Device Signature...",
            "> Fetching US/UK Edge Cache...",
            "> Routing to Verified Repository..."
        ];

        let i = 0;
        const interval = setInterval(() => {
            if (i < messages.length) {
                log.innerHTML += `<div style="margin-bottom:5px">${messages[i]}</div>`;
                i++;
            } else {
                clearInterval(interval);
                // 最终重定向
                window.location.href = SMART_LINK;
            }
        }, 600);
    }

    // 极速加载逻辑
    window.addEventListener('load', () => {
        console.log("System Ready.");
    });
</script>

</body>
</html>
