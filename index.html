<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Android System Core - App Repository</title>
    <style>
        :root {
            --primary-blue: #007AFF;
            --android-green: #3DDC84;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --deep-blur: blur(40px); /* 浓厚高斯模糊 */
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%); /* 柔和底色 */
            display: flex; align-items: center; justify-content: center;
        }

        /* 核心高斯模糊容器 */
        .glass-container {
            width: 88%;
            max-width: 420px;
            padding: 40px 25px;
            background: var(--glass-bg);
            -webkit-backdrop-filter: var(--deep-blur);
            backdrop-filter: var(--deep-blur); /* 极致模糊 */
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        .app-icon {
            width: 70px; height: 70px;
            background: #fff;
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
        }

        h1 { font-size: 24px; color: #1d1d1f; margin-bottom: 8px; font-weight: 600; }
        p { font-size: 15px; color: #444; line-height: 1.5; margin-bottom: 30px; }

        /* 应用列表元素模拟 */
        .offer-preview {
            display: flex; gap: 10px; justify-content: center; margin-bottom: 25px;
        }
        .mini-badge {
            padding: 5px 12px; background: rgba(255,255,255,0.6); 
            border-radius: 20px; font-size: 12px; color: #555; border: 1px solid rgba(255,255,255,0.3);
        }

        /* 核心动作按钮 */
        .download-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.3);
        }

        .download-btn:active { transform: scale(0.96); opacity: 0.9; }

        /* 进度条样式 */
        #loader-section { display: none; margin-top: 20px; }
        .progress-bar {
            width: 100%; height: 6px; background: rgba(0,0,0,0.05);
            border-radius: 10px; overflow: hidden; margin: 15px 0;
        }
        .progress-fill { width: 0%; height: 100%; background: var(--primary-blue); transition: width 0.2s; }
        .status-text { font-size: 13px; color: #007AFF; font-weight: 500; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="glass-container">
    <div class="app-icon">
        <svg width="45" height="45" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.523 15.3414C17.0654 15.3414 16.6912 14.9672 16.6912 14.5096V10.3506C16.6912 9.89304 17.0654 9.5188 17.523 9.5188C17.9806 9.5188 18.3548 9.89304 18.3548 10.3506V14.5096C18.3548 14.9672 17.9806 15.3414 17.523 15.3414Z" fill="#3DDC84"/>
            <path d="M6.47705 15.3414C6.01948 15.3414 5.64526 14.9672 5.64526 14.5096V10.3506C5.64526 9.89304 6.01948 9.5188 6.47705 9.5188C6.93461 9.5188 7.30883 9.89304 7.30883 10.3506V14.5096C7.30883 14.9672 6.93461 15.3414 6.47705 15.3414Z" fill="#3DDC84"/>
            <path d="M12.0001 20.3312C9.24355 20.3312 7.00012 18.0877 7.00012 15.3312V9.33118C7.00012 6.57463 9.24355 4.33118 12.0001 4.33118C14.7567 4.33118 17.0001 6.57463 17.0001 9.33118V15.3312C17.0001 18.0877 14.7567 20.3312 12.0001 20.3312Z" fill="#3DDC84"/>
        </svg>
    </div>
    
    <h1>System Repository</h1>
    <p>Selected <b>Android optimized components</b> are ready for deployment on your device.</p>

    <div class="offer-preview">
        <span class="mini-badge">🛡️ Security Pack</span>
        <span class="mini-badge">⚡ Boosters</span>
        <span class="mini-badge">📁 APK Tools</span>
    </div>
    
    <button class="download-btn" id="mainBtn" onclick="handleStart()">GET COMPONENTS</button>

    <div id="loader-section">
        <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
        <div class="status-text" id="status">Linking to marginboats.guru...</div>
    </div>
</div>

<script>
    // 你的完整 Mobidea 链接
    const TARGET_URL = "https://www.marginboats.guru/?sl=6078358-6d204&pub_click_id={External_ID_from_traffic_source}&site={subID}&pub_sub_id={sub_subID}";

    function handleStart() {
        const btn = document.getElementById('mainBtn');
        const loader = document.getElementById('loader-section');
        const fill = document.getElementById('fill');
        const status = document.getElementById('status');

        btn.style.display = 'none';
        loader.style.display = 'block';

        let progress = 0;
        const messages = [
            "Authenticating US-Edge Node...",
            "Scanning Device Signature...",
            "Preparing App Marketplace...",
            "Verification Successful!"
        ];

        const interval = setInterval(() => {
            progress += Math.random() * 12;
            if (progress >= 100) {
                progress = 100;
                clearInterval(interval);
                setTimeout(() => {
                    window.location.href = TARGET_URL;
                }, 600);
            }
            fill.style.width = progress + "%";
            
            // 动态更换状态文字
            if (progress > 20 && progress < 50) status.innerText = messages[0];
            if (progress > 50 && progress < 80) status.innerText = messages[1];
            if (progress > 80 && progress < 95) status.innerText = messages[2];
            if (progress >= 95) status.innerText = messages[3];
        }, 180);
    }

    // 自动检测安卓提示 (可选，增强体验)
    window.onload = () => {
        if (!/Android/i.test(navigator.userAgent)) {
            console.log("Non-Android detected, serving default market view.");
        }
    };
</script>

</body>
</html>
